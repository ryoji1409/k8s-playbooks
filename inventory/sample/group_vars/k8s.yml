---
control_plane_endpoint: 10.0.0.1  # e.g. keepalived virtual_ip
pod_network_cidr: 10.244.0.0/16
service_network_cidr: 10.96.0.0/12
kube_api_endpoint: control.plane.endpoint
kube_api_endpoint_port: 6443

# https://www.suse.com/suse-rancher/support-matrix/all-supported-versions
# https://github.com/rancher/rke2/tags
# https://kubernetes.io/releases/
kubectl_version: "v1.33.5"
# https://github.com/helmfile/helmfile/releases
helmfile_version: "1.2.2"
# https://github.com/containerd/nerdctl/releases
nerdctl_version: "2.1.6"
buildkit_version: "v0.26.2"
buildkit_containerd_address_map:
  rke2: "/run/k3s/containerd/containerd.sock"
  kubeadm: "/run/containerd/containerd.sock"
buildkit_containerd_address: "{{ buildkit_containerd_address_map[buildkit_containerd_flavor] }}"
buildkit_containerd_namespace: "k8s.io"
# https://github.com/etcd-io/etcd/releases
etcd_version: "3.5.21"

cilium_version: "1.17.6"  # https://github.com/cilium/cilium/releases
flannel_version: "latest"  # https://github.com/flannel-io/flannel/releases
calico_version: "v3.30.2"  # https://github.com/projectcalico/calico/releases
cilium_namespace: kube-system
cilium_helm_repo: https://helm.cilium.io/
cilium_helm_chart: cilium/cilium
replacement_status: false  # true: without kube-proxy

# RKE2 specific settings
rke2_version: "{{ kubectl_version }}+rke2r1"
rke2_channel: "stable"  # stable, latest, or specific version
rke2_cni: "multus,canal"  # canal, cilium, calico, or none
rke2_cluster_cidr: "{{ pod_network_cidr }}"
rke2_service_cidr: "{{ service_network_cidr }}"
rke2_data_dir: "/var/lib/rancher/rke2"
rke2_config_dir: "/etc/rancher/rke2"
rke2_install_script_url: "https://get.rke2.io"
# RKE2 Kubelet arguments
rke2_kubelet_args:
  - "max-pods=500"
# RKE2 Controller Manager arguments
rke2_kube_controller_manager_args:
  - "node-cidr-mask-size=22"
  - "cert-dir=/var/lib/rancher/rke2/server/tls/kube-controller-manager"
  - "secure-port=10257"
# RKE2 Scheduler arguments
rke2_kube_scheduler_args:
  - "cert-dir=/var/lib/rancher/rke2/server/tls/kube-scheduler"
  - "secure-port=10259"
# RKE2 Extra mounts
rke2_kube_controller_manager_extra_mount:
  - "/var/lib/rancher/rke2/server/tls/kube-controller-manager:/var/lib/rancher/rke2/server/tls/kube-controller-manager"
rke2_kube_scheduler_extra_mount:
  - "/var/lib/rancher/rke2/server/tls/kube-scheduler:/var/lib/rancher/rke2/server/tls/kube-scheduler"
# RKE2 Node labels
rke2_node_labels:
  - "cattle.io/os=linux"
# RKE2 Control Plane taints
rke2_control_plane_taints:
  - "node-role.kubernetes.io/control-plane:NoSchedule"
  - "node-role.kubernetes.io/etcd:NoExecute"
# RKE2 Private registry configuration (optional)
rke2_private_registry_config: "/etc/rancher/rke2/registries.yaml"
# RKE2 Agent token (optional, will use server token if not specified)
# rke2_agent_token: ""
# RKE2 Registration address
registration_address: 10.0.0.5
# rke2_disable_packaged_components:
#   - "rke2-ingress-nginx"

gpu_taints:
  - "nvidia.com/gpu=true:NoSchedule"

kube_control_plane:
  control_plane01:
    host_name: control_plane01
    address: 192.168.10.1
    internal_address: 10.0.0.5
  control_plane02:
    host_name: control_plane02
    address: 192.168.10.2
    internal_address: 10.0.0.6
kube_node:
  node01:
    host_name: node01
    address: 192.168.10.3
    internal_address: 10.0.0.8
  node02:
    host_name: node02
    address: 192.168.10.4
    internal_address: 10.0.0.9
  node03:
    host_name: node03
    address: 192.168.10.5
    internal_address: 10.0.0.10
  node04:
    host_name: node04
    address: 192.168.10.6
    internal_address: 10.0.0.11
haproxy:
  proxy01:
    host_name: proxy01
    address: 192.168.10.7
    internal_address: 10.0.0.12
    keepalived_role: master
  proxy02:
    host_name: proxy02
    address: 192.168.10.8
    internal_address: 10.0.0.13
    keepalived_role: backup
rancher_admin:
  rancher_admin01:
    host_name: rancher_admin01
    address: 192.168.10.9
    internal_address: 10.0.0.14
