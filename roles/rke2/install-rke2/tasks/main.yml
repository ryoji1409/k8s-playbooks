---
- name: Check if RKE2 is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/rke2
  register: rke2_binary

- name: Check installed RKE2 version
  ansible.builtin.command: /usr/local/bin/rke2 --version
  register: rke2_version_output
  changed_when: false
  failed_when: false
  when: rke2_binary.stat.exists

- name: Set RKE2 type based on node group
  ansible.builtin.set_fact:
    rke2_type: "{{ 'server' if 'kube_control_plane' in group_names else 'agent' }}"

- name: Download RKE2 installation script
  ansible.builtin.get_url:
    url: "{{ rke2_install_script_url }}"
    dest: /tmp/install-rke2.sh
    mode: "0755"
  when: not rke2_binary.stat.exists or (rke2_version not in rke2_version_output.stdout)

- name: Install RKE2 {{ rke2_type }}
  ansible.builtin.shell: |
    INSTALL_RKE2_VERSION="{{ rke2_version }}" \
    INSTALL_RKE2_TYPE="{{ rke2_type }}" \
    sh /tmp/install-rke2.sh
  args:
    creates: /usr/local/bin/rke2
  when: not rke2_binary.stat.exists or (rke2_version not in rke2_version_output.stdout)

- name: Create RKE2 config directory
  ansible.builtin.file:
    path: "{{ rke2_config_dir }}"
    state: directory
    mode: "0755"

- name: Remove installation script
  ansible.builtin.file:
    path: /tmp/install-rke2.sh
    state: absent
