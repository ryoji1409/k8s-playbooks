---
- name: Check if RKE2 server is already initialized
  ansible.builtin.stat:
    path: "{{ rke2_data_dir }}/server/node-token"
  register: rke2_token_file

- name: Create RKE2 server configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ rke2_config_dir }}/config.yaml"
    mode: "0600"

- name: Enable and start RKE2 server service
  ansible.builtin.systemd:
    name: rke2-server
    enabled: true
    state: started
  when: not rke2_token_file.stat.exists

- name: Wait for RKE2 server to be ready
  ansible.builtin.wait_for:
    path: "{{ rke2_data_dir }}/server/node-token"
    timeout: 300
  when: not rke2_token_file.stat.exists

- name: Wait for kubectl to be functional
  ansible.builtin.command: >
    /var/lib/rancher/rke2/bin/kubectl --kubeconfig {{ rke2_data_dir }}/server/cred/admin.kubeconfig get nodes
  register: kubectl_get_nodes
  until: kubectl_get_nodes.rc == 0
  retries: 30
  delay: 10
  changed_when: false

- name: Read RKE2 node token
  ansible.builtin.slurp:
    path: "{{ rke2_data_dir }}/server/node-token"
  register: rke2_node_token

- name: Set RKE2 token fact
  ansible.builtin.set_fact:
    rke2_token: "{{ rke2_node_token.content | b64decode | trim }}"

- name: Create kubeconfig directory for user
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: "0755"

- name: Copy kubeconfig to user directory
  ansible.builtin.copy:
    src: "{{ rke2_data_dir }}/server/cred/admin.kubeconfig"
    dest: "{{ ansible_env.HOME }}/.kube/config"
    remote_src: true
    mode: "0600"

- name: Display cluster info
  ansible.builtin.debug:
    msg: "RKE2 server initialized successfully. Token: {{ rke2_token[:20] }}..."
