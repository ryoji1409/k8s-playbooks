---
- name: Install ca-certificates package (Debian/Ubuntu)
  ansible.builtin.apt:
    name: ca-certificates
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install ca-certificates package (RedHat)
  ansible.builtin.dnf:
    name: ca-certificates
    state: present
  when: ansible_os_family == "RedHat"

- name: Ensure CA certificate directory exists (Debian/Ubuntu)
  ansible.builtin.file:
    path: /usr/local/share/ca-certificates
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: ansible_os_family == "Debian"

- name: Ensure CA certificate directory exists (RedHat)
  ansible.builtin.file:
    path: /etc/pki/ca-trust/source/anchors
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: ansible_os_family == "RedHat"

- name: Copy CA certificates (Debian/Ubuntu)
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/usr/local/share/ca-certificates/{{ item | basename }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ ca_cert_files }}"
  when: ansible_os_family == "Debian"
  register: install_ca_cert_copy_debian

- name: Copy CA certificates (RedHat)
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/pki/ca-trust/source/anchors/{{ item | basename }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ ca_cert_files }}"
  when: ansible_os_family == "RedHat"
  register: install_ca_cert_copy_rhel

- name: Update CA trust store (Debian/Ubuntu)
  ansible.builtin.command: update-ca-certificates
  when:
    - ansible_os_family == "Debian"
    - install_ca_cert_copy_debian.changed
  changed_when: true

- name: Update CA trust store (RedHat)
  ansible.builtin.command: update-ca-trust extract
  when:
    - ansible_os_family == "RedHat"
    - install_ca_cert_copy_rhel.changed
  changed_when: true
