---
- name: Get RKE2 token from existing cluster
  hosts: kube_control_plane,kube_node
  become: true
  become_user: root
  tasks:
    - name: Read RKE2 node token
      delegate_to: "{{ groups['kube_control_plane'][0] }}"
      ansible.builtin.slurp:
        path: "{{ rke2_data_dir }}/server/node-token"
      register: rke2_node_token

    - name: Set RKE2 token fact
      ansible.builtin.set_fact:
        rke2_token: "{{ rke2_node_token.content | b64decode | trim }}"

- name: Setup new nodes
  hosts: kube_control_plane,kube_node
  become: true
  become_user: root
  roles:
    - role: setup
    - role: install-tools
  vars:
    buildkit_containerd_flavor: "rke2"

- name: Install RKE2 on new nodes
  hosts: kube_control_plane,kube_node
  become: true
  become_user: root
  roles:
    - role: rke2/install-rke2

- name: Join new nodes to cluster
  hosts: kube_control_plane,kube_node
  become: true
  become_user: root
  serial: 1
  roles:
    - role: rke2/rke2-join

- name: Display cluster information
  hosts: kube_control_plane,kube_node
  become: true
  become_user: root
  tasks:
    - name: Get cluster nodes
      delegate_to: "{{ groups['kube_control_plane'][0] }}"
      ansible.builtin.command: >
        /var/lib/rancher/rke2/bin/kubectl --kubeconfig {{ rke2_data_dir }}/server/cred/admin.kubeconfig get nodes -o wide
      register: cluster_nodes
      changed_when: false

    - name: Display nodes
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout_lines }}"
