---
- name: Upgrade RKE2 cluster
  hosts: kube_control_plane,kube_node
  become: true
  become_user: root
  serial: 1
  vars:
    kubectl_bin: "/var/lib/rancher/rke2/bin/kubectl"
    kubeconfig: "{{ rke2_data_dir }}/server/cred/admin.kubeconfig"
  tasks:
    - name: Display upgrade information
      ansible.builtin.debug:
        msg: "Upgrading {{ inventory_hostname }} to RKE2 version {{ rke2_version }}"

    - name: Get node name
      ansible.builtin.shell: |
        {{ kubectl_bin }} --kubeconfig {{ kubeconfig }} get nodes -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}' | grep -i "{{ inventory_hostname }}"
      register: kubectl_node_name
      retries: 5
      delay: 5
      until: kubectl_node_name.rc == 0
      failed_when: false
      delegate_to: "{{ groups['kube_control_plane'][0] }}"
      changed_when: false

    - name: Drain node (from first control plane)
      ansible.builtin.command: >
        {{ kubectl_bin }} --kubeconfig {{ kubeconfig }} drain {{ kubectl_node_name.stdout }}
        --ignore-daemonsets
        --delete-emptydir-data
        --force
        --timeout=300s
      delegate_to: "{{ groups['kube_control_plane'][0] }}"
      when: "'kube_node' in group_names or inventory_hostname != groups['kube_control_plane'][0]"

    - name: Upgrade RKE2
      ansible.builtin.include_role:
        name: rke2/rke2-upgrade

    - name: Wait for node to be ready
      ansible.builtin.command: >
        {{ kubectl_bin }} --kubeconfig {{ kubeconfig }} get node {{ kubectl_node_name.stdout }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      until: node_ready.stdout == 'True'
      retries: 30
      delay: 10
      delegate_to: "{{ groups['kube_control_plane'][0] }}"
      changed_when: false

    - name: Uncordon node (from first control plane)
      ansible.builtin.command: >
        {{ kubectl_bin }} --kubeconfig {{ kubeconfig }} uncordon {{ kubectl_node_name.stdout }}
      delegate_to: "{{ groups['kube_control_plane'][0] }}"
      when: "'kube_node' in group_names or inventory_hostname != groups['kube_control_plane'][0]"

    - name: Display upgrade completion
      ansible.builtin.debug:
        msg: "Successfully upgraded {{ inventory_hostname }}"

- name: Display upgraded cluster information
  hosts: kube_control_plane,kube_node
  become: true
  become_user: root
  tasks:
    - name: Get cluster nodes with versions
      delegate_to: "{{ groups['kube_control_plane'][0] }}"
      ansible.builtin.command: >
        /var/lib/rancher/rke2/bin/kubectl --kubeconfig {{ rke2_data_dir }}/server/cred/admin.kubeconfig  get nodes -o wide
      register: cluster_nodes
      changed_when: false
      when: inventory_hostname == ansible_play_hosts_all[0]

    - name: Display nodes
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout_lines }}"
      when: inventory_hostname == ansible_play_hosts_all[0]
