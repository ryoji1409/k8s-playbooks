---
- name: Install RKE2 on all nodes
  hosts: kube_control_plane,kube_node
  become: true
  become_user: root
  roles:
    - role: rke2/install-rke2

- name: Initialize first control plane node
  hosts: kube_control_plane[0]
  become: true
  become_user: root
  roles:
    - role: rke2/rke2-server-init

- name: Set RKE2 token fact for all nodes
  hosts: kube_control_plane,kube_node
  tasks:
    - name: Set RKE2 token from first control plane
      ansible.builtin.set_fact:
        rke2_token: "{{ hostvars[groups['kube_control_plane'][0]]['rke2_token'] }}"

- name: Join additional control plane nodes
  hosts: kube_control_plane[1:]
  become: true
  become_user: root
  serial: 1
  roles:
    - role: rke2/rke2-join

- name: Join worker nodes
  hosts: kube_node
  become: true
  become_user: root
  serial: 1
  roles:
    - role: rke2/rke2-join

- name: Display cluster information
  hosts: kube_control_plane,kube_node
  become: true
  become_user: root
  tasks:
    - name: Get cluster nodes
      delegate_to: "{{ groups['kube_control_plane'][0] }}"
      ansible.builtin.command: >
        /var/lib/rancher/rke2/bin/kubectl --kubeconfig {{ rke2_data_dir }}/server/cred/admin.kubeconfig get nodes -o wide
      register: cluster_nodes
      changed_when: false
      when: inventory_hostname == ansible_play_hosts_all[0]

    - name: Display nodes
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout_lines }}"
      when: inventory_hostname == ansible_play_hosts_all[0]
